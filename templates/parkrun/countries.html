{% extends "base.html" %}
{% block title %}Countries - Parkrun{% endblock %}

{% block content %}
<div class="container-fluid mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="mb-0">Parkrun Countries</h1>

        <!-- Toggle button for series -->
        <button id="seriesToggleBtn" class="btn btn-outline-primary">
            Showing: Standard (Saturday)
        </button>
    </div>

    <div class="table-responsive">
        <table id="countries-table" class="table table-striped table-hover align-middle">
            <thead class="table-dark">
                <tr>
                    <th data-base="Country">Country</th>
                    <th id="series-column-header" data-base="Number">Number</th>
                </tr>
            </thead>
            <tbody>
                {% for country in countries %}
                <tr
                    data-standard="{{ country.standard_events }}"
                    data-junior="{{ country.junior_events }}"
                >
                    <td>
                        {% if country.iso_code %}
                            <img class="flag me-2"
                                 src="https://flagcdn.com/24x18/{{ country.iso_code|lower }}.png"
                                 alt="{{ country.country_name }}">
                        {% endif %}
                        {{ country.country_name }}
                    </td>

                    <td class="series-value"
                        data-sort-value="{{ country.standard_events }}">
                        {{ country.standard_events }}
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

</div>

<style>
.flag { width: 24px; height: 18px; vertical-align: middle; }
</style>

<script src="https://unpkg.com/tablesort@5.2.1/dist/tablesort.min.js"></script>
<script src="https://unpkg.com/tablesort@5.2.1/dist/sorts/tablesort.number.min.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function() {

    const table = document.getElementById("countries-table");
    const toggleBtn = document.getElementById("seriesToggleBtn");
    const rows = table.querySelectorAll("tbody tr");
    const headers = table.querySelectorAll("th");
    const seriesColumn = document.getElementById("series-column-header");

    const ts = new Tablesort(table);
    let currentSeries = "standard";

    function updateView() {
        toggleBtn.textContent = currentSeries === "standard"
            ? "Showing: Standard (Saturday)"
            : "Showing: Junior (Sunday)";

        rows.forEach(row => {
            const valueCell = row.querySelector(".series-value");
            const value = currentSeries === "standard"
                ? parseInt(row.dataset.standard)
                : parseInt(row.dataset.junior);

            valueCell.textContent = value;
            valueCell.setAttribute("data-sort-value", value);
            row.style.display = value > 0 ? "" : "none";
        });

        // Default sort: country ascending
        const firstHeader = table.tHead.rows[0].cells[0];
        ts.sortColumn(firstHeader, false);
        setHeaderArrow(firstHeader, "asc");
    }

    function clearHeaderArrows() {
        headers.forEach(th => th.textContent = th.dataset.base);
    }

    function setHeaderArrow(th, direction) {
        clearHeaderArrows();
        th.textContent = th.dataset.base + (direction === "asc" ? " ▲" : " ▼");
        th.dataset.sortDir = direction;
    }

    // Toggle series
    toggleBtn.addEventListener("click", () => {
        currentSeries = currentSeries === "standard" ? "junior" : "standard";
        updateView();
    });

    updateView();

    // Header click sorting indicator
    headers.forEach(th => {
        th.addEventListener("click", () => {
            const newDir = th.dataset.sortDir === "asc" ? "desc" : "asc";
            setHeaderArrow(th, newDir);
        });
    });

});
</script>

{% endblock %}
