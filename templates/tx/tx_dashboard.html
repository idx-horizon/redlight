{% extends "base.html" %}

{% block content %}
<div class="container mt-4">

    <div class="row mb-3">
        <div class="col-md-4">
            <label for="supplierSelect">Select Supplier</label>
            <select id="supplierSelect" class="form-select">
                {% for supplier in suppliers %}
                    <option value="{{ supplier }}">{{ supplier }}</option>
                {% endfor %}
            </select>
        </div>
    </div>

    <!-- Summary Card -->
    <div class="row g-3 mb-4" id="summaryCards">
        <!-- JS will populate the card here -->
    </div>

    <!-- Monthly Spend Chart -->
    <div class="row mb-4">
        <div class="col-md-12">
            <canvas id="monthlyChart"></canvas>
        </div>
    </div>

    <!-- Monthly Table -->
    <div class="row">
        <div class="col-md-12">
            <table class="table table-striped table-bordered">
                <thead>
                    <tr>
                        <th>Month</th>
                        <th>Amount (£)</th>
                        <th>Transactions</th>
                    </tr>
                </thead>
                <tbody id="monthlyTableBody">
                    <!-- JS will populate the table -->
                </tbody>
            </table>
        </div>
    </div>

</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
const suppliers = {{ suppliers | tojson }};
const supplierSummary = {{ supplier_summary | tojson }};
const monthlyTable = {{ monthly_table | tojson }};
const chartLabels = {{ chart_labels | tojson }};
const chartDatasets = {{ chart_datasets | tojson }};
const supplierColors = {{ supplier_colors | tojson }};

let currentSupplier = suppliers[0];

// --- Update Summary Card ---
// --- Helper to format date as dd-MMM-yyyy ---
function formatDate(d) {
    if (!d) return "—";
    const dateObj = new Date(d);
    const options = { day: "2-digit", month: "short", year: "numeric" };
    return dateObj.toLocaleDateString(undefined, options);
}

// --- Update Summary Cards ---
function updateSummaryCard() {
    const s = supplierSummary[currentSupplier] || {};
    const total = s.total_amount || 0;
    const count = s.transaction_count || 0;
    const minDate = formatDate(s.min_date);
    const maxDate = formatDate(s.max_date);

    const summaryCards = document.getElementById("summaryCards");
    summaryCards.innerHTML = `
        <div class="col-md-4">
            <div class="card shadow-sm text-center">
                <div class="card-body">
                    <h6>Total Amount</h6>
                    <div class="card-value">£${total.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card shadow-sm text-center">
                <div class="card-body">
                    <h6>Date Range</h6>
                    <div class="card-value">${minDate} → ${maxDate}</div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card shadow-sm text-center">
                <div class="card-body">
                    <h6>Transactions</h6>
                    <div class="card-value">${count.toLocaleString()}</div>
                </div>
            </div>
        </div>
    `;
}

//

function formatMonth(monthStr) {
    if (!monthStr) return "—";
    // monthStr is like "2024-02"
    const parts = monthStr.split("-");
    const year = parts[0];
    const month = parts[1] - 1; // JS months 0-based
    const dateObj = new Date(year, month);
    return dateObj.toLocaleString(undefined, { month: "short", year: "numeric" }); // "Feb 2024"
}

function updateMonthlyTable() {
    const tableBody = document.getElementById("monthlyTableBody");
    tableBody.innerHTML = "";

    chartLabels.forEach(month => {
        const row = monthlyTable.find(r => r.month === month && r.supplier === currentSupplier);
        const amount = row ? row.amount : 0;
        const count = row ? row.transaction_count : 0;

        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${formatMonth(month)}</td>
            <td>£${Number(amount).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</td>
            <td>${Number(count).toLocaleString()}</td>
        `;
        tableBody.appendChild(tr);
    });
}
// --- Initialize Chart ---
let chart;
function renderChart() {
    const dataset = chartDatasets.find(d => d.label === currentSupplier);
    const data = dataset ? dataset.data : chartLabels.map(() => 0);

    const ctx = document.getElementById("monthlyChart").getContext("2d");
    if(chart) chart.destroy();

    chart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: chartLabels,
            datasets: [{
                label: currentSupplier,
                data: data,
                backgroundColor: supplierColors[currentSupplier] || 'rgba(54,162,235,0.6)'
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { display: false }
            },
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });
}

// --- Event Listener ---
document.getElementById("supplierSelect").addEventListener("change", e => {
    currentSupplier = e.target.value;
    updateSummaryCard();
    updateMonthlyTable();
    renderChart();
});

// --- Initial Load ---
updateSummaryCard();
updateMonthlyTable();
renderChart();

</script>
{% endblock %}
