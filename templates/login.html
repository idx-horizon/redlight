{% extends "base.html" %}

{% block content %}
<div class="container-fluid d-flex align-items-center justify-content-center" style="min-height: 80vh;">
    <div class="card shadow-sm login-card">
        <div class="card-body p-4">

            <div class="text-center mb-4">
                <h3 class="fw-semibold">Sign in</h3>
                <p class="text-muted small mb-0">Access your analytics dashboard</p>
            </div>

            {% if error %}
               <div class="alert alert-danger d-flex align-items-center py-2 mb-3">
                 <span class="me-2">⚠️</span>
                 <div>{{ error }}</div>
              </div>
            {% endif %}

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Username</label>

                    <input
                        type="text"
                        name="username"
                        class="form-control" {% if error %}is-invalid{% endif %}
                        autocorrect="off"
                        autocapitalize="none"
                        spellcheck="false"
                        required
                        autofocus
                     >
                </div>

                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <input
                        type="password"
                        name="password"
                        class="form-control" {% if error %}is-invalid{% endif %}"
                        autocorrect="off"
                        autocapitalize="none"
                        spellcheck="false"
                        required>
                </div>

                <button class="btn btn-danger w-100 fw-semibold">
                    Sign in
                </button>
            </form>

            <div class="text-center mt-3 small text-muted">
                Red Analytics Platform
            </div>

        </div>
    </div>
</div>
{% endblock %}
