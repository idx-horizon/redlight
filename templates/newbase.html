<style>
/* ------------------- RESET ------------------- */
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    font-family: inherit;
    box-sizing: border-box;
}

/* ------------------- NAVBAR ------------------- */
.navbar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 50px;   /* navbar height */
    z-index: 1050;
}

/* ------------------- SIDEBAR ------------------- */
.sidebar {
    position: fixed;
    top: 50px;      /* below navbar */
    left: 0;
    bottom: 0;
    width: 220px;   /* desktop width */
    background-color: #343a40;
    z-index: 1040;
    overflow-y: auto;
    transition: left 0.25s ease;
}

.sidebar.show {
    left: 0;
}

/* Sidebar links */
.sidebar .nav-link {
    color: #ccc;
    font-weight: 500;
    padding: 10px 16px;
    font-size: 1rem;
}
.sidebar .nav-link:hover,
.sidebar .nav-link.active {
    color: #fff;
    background-color: #495057;
    border-radius: 6px;
}

.sidebar .sidebar-heading {
    display: flex;
    width: 100%;
    text-align: left;
    align-items: center;
    gap: 8px;
    justify-content: flex-start;
}

/* ------------------- MAIN CONTENT ------------------- */
main {
    margin-left: 220px;  /* shift for desktop sidebar */
    margin-top: 50px;    /* push below navbar */
    flex: 1 1 auto;
    display: flex;
    flex-direction: column;
    padding: 0;
}

/* ------------------- MAP ------------------- */
.map-wrapper {
    flex: 1 1 auto;      /* grow to fill main */
    width: 100%;
    border: 1px solid green;
    position: relative;
}

.map-wrapper .leaflet-container,
.map-wrapper .folium-map {
    width: 100% !important;
    height: 100% !important;
    display: block;
    box-sizing: border-box;
}

/* ------------------- MOBILE SIDEBAR ------------------- */
@media (max-width: 767.98px) {

    main {
        margin-left: 0;      /* remove desktop spacing */
    }

    .sidebar {
        top: 50px;          /* below navbar */
        left: -75vw;         /* hidden by default */
        width: 75vw;
        height: calc(100vh - 50px); /* full height below navbar */
    }

    .sidebar.show {
        left: 0;
    }

    .sidebar .nav-link {
        padding: 14px 20px;
        font-size: 1.1rem;
    }

    body.sidebar-open {
        overflow: hidden;
    }

    .map-wrapper {
        height: calc(100vh - 50px); /* fill remaining viewport height */
    }
}

/* ------------------- ICONS ------------------- */
.my-icon {
    color: #00c853;
}

/* ------------------- PAGE HEADER ------------------- */
.page-header {
    background-color: #343a40;
    color: #fff;
    padding: 1rem 1.5rem;
    margin-bottom: 1rem;
    border-radius: 8px;
}

/* ------------------- MODALS ------------------- */
.modal-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    background: rgba(0,0,0,0.2);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}
.modal-box {
    background: #fff;
    color: #000;
    padding: 1rem;
    border-radius: 6px;
    width: 320px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.3);
}
.modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 0.5rem;
}
.hidden { display: none; }

/* ------------------- TABLES ------------------- */
th a {
    color: inherit;
    text-decoration: none;
    display: block;
    width: 100%;
}
th {
    cursor: pointer;
}

/* ------------------- COUNTRY LINKS ------------------- */
.country-link {
    display: inline-block;
    padding: 6px 12px;
    border-radius: 20px;
    text-decoration: none;
    background-color: #f8f9fa;
    color: #212529;
    transition: all 0.2s ease-in-out;
    font-weight: 500;
}
.country-link:hover {
    background-color: #0d6efd;
    color: white;
    text-decoration: none;
}

/* ------------------- LOGIN CARD ------------------- */
.login-card {
    width: 100%;
    max-width: 380px;
    border-radius: 12px;
    margin: 0 auto;
}
.login-card .form-control {
    border-radius: 8px;
    padding: 10px 12px;
}
.login-card .btn {
    border-radius: 8px;
    padding: 10px;
}

/* ------------------- FOOTER ------------------- */
footer.footer {
    padding: 1rem;
    font-size: 0.9rem;
}
</style>
